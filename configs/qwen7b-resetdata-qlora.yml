base_model: Qwen/Qwen2.5-7B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

load_in_4bit: true
adapter: qlora

datasets:
  - path: ./data/resetdata_platform_100_alpaca.jsonl
    type: alpaca

output_dir: ./outputs/qwen7b-resetdata-qlora

sequence_len: 1024
sample_packing: false

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

micro_batch_size: 1
gradient_accumulation_steps: 2

num_epochs: 3

optimizer: adamw_bnb_8bit
learning_rate: 0.0002
lr_scheduler: cosine

bf16: true
tf32: true
gradient_checkpointing: true

logging_steps: 1
warmup_ratio: 0.1

evals_per_epoch: 0
saves_per_epoch: 1

weight_decay: 0.0
